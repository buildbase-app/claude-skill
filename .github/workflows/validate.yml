name: Validate skill

# Runs on every PR and on pushes to main. Add "Validate skill" as a
# required status check in the main ruleset to block merges that fail.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run skill validation
        run: python3 scripts/validate.py
